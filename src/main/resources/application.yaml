spring:
  application:
    name: quiz-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:quiz_atlas}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
      repositories:
        enabled: false

quiz:
  ai-import:
    rate-limit:
      max-requests-per-hour: ${AI_IMPORT_RATE_LIMIT_PER_HOUR:5}
    # 任务整体超时阈值（毫秒）。需 ≥ MinerU 单任务轮询超时(默认 1800s) + LLM 调用时间，
    # 否则 Watchdog 会强行把仍在处理中的长任务标为 FAILED。
    task-timeout-ms: ${AI_IMPORT_TASK_TIMEOUT_MS:1800000}
  filestorage:
    # 文件落盘根目录。Java 后端与 Python Worker 必须能访问同一目录（绝对路径）。
    # Windows 默认 ./data/upload，Linux 可通过 FILE_UPLOAD_DIR 环境变量覆盖。
    local-dir: ${FILE_UPLOAD_DIR:./data/upload}

jwt:
  secret: ${JWT_SECRET:YOUR_SUPER_SECRET_KEY_MUST_BE_LONG_ENOUGH}
  expiration: 864000000

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
